
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>プロフィール</title>
    <style>
        .menu-profile {
    text-align: center;
    padding: 10px;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 8px;
}

.menu-profile-img {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--main-color);
}

.menu-profile-img.empty {
    background: var(--soft-color);
    display: inline-block;
}

.menu-name {
    margin-top: 6px;
    font-weight: bold;
    color: #333;
}
        :root {
                  --bg-color: var(--bg-color);
                  --main-color: var(--main-color);
                  --border-color: #ffd6dc;
                  --soft-color:var(--soft-color);
                }

        .menu {
              position: fixed;
              top: 15px;
              right: 15px;
              z-index: 1000;
        }

        .menu-btn {
              background: var(--main-color);
              color: white;
              border: none;
              border-radius: 50%;
              width: 45px;
              height: 45px;
              font-size: 22px;
              cursor: pointer;
        }

            .menu-content {
               display: none;
               position: absolute;
               right: 0;
               margin-top: 8px;
               background: white;
               border: 1px solid #ffd6dc;
               border-radius: 12px;
               padding: 10px;
               width: 170px;
               box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .menu-content a {
               display: block;
               padding: 10px;
               color: #333;
               text-decoration: none;
               border-radius: 8px;
        }

        .menu-content a:hover {
             background: var(--soft-color);
        }
        body {
            font-family: Arial, sans-serif;
            background:var(--bg-color);
            margin: 20px;
        }

        .container {
            max-width: 430px;
            margin: 0 auto;
            background: white;
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--main-color);
            margin-bottom: 15px;
        }

        input, select, textarea {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid #ccc;
        }

        button, .back-btn {
            background: var(--main-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px 15px;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="menu">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div class="menu-content" id="menuContent">

        <div class="menu-profile">
            {% if profile and profile["image_path"] %}
                <img src="{{ url_for('uploaded_file', filename=profile['image_path']) }}" class="menu-profile-img">
            {% else %}
                <div class="menu-profile-img empty"></div>
            {% endif %}

            <div class="menu-name">
                {{ profile["nickname"] if profile else "ゲスト" }}
            </div>
        </div>

        <a href="/">AI旅行プランナー</a>
        <a href="/profile">プロフィール</a>
        <a href="/saved">保存済みプラン</a>
    </div>
</div>
</div>

<div class="container">

    <a href="/" class="back-btn">← AI旅行プランナーへ戻る</a>

    <h1>プロフィール</h1>

    {% if profile and profile["image_path"] %}
       <img src="{{ url_for('uploaded_file', filename=profile['image_path']) }}" class="profile-image">
    {% else %}
        <div class="profile-image" style="margin:auto; background:var(--soft-color);"></div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">

        <p>プロフィール画像</p>
        <input type="file" name="profile_image">

        <p>ニックネーム</p>
        <input type="text" name="nickname"
               value="{{ profile['nickname'] if profile else '' }}"
               placeholder="例：ちゃっぴー" required>

        <p>年齢</p>
        <input type="text" name="age"
               value="{{ profile['age'] if profile else '' }}"
               placeholder="例：21">

        <p>MBTI</p>
        <select name="mbti">
            <option value="">選択してください</option>
            {% for type in ["INTJ","INTP","ENTJ","ENTP","INFJ","INFP","ENFJ","ENFP","ISTJ","ISFJ","ESTJ","ESFJ","ISTP","ISFP","ESTP","ESFP"] %}
                <option value="{{ type }}"
                    {% if profile and profile["mbti"] == type %}selected{% endif %}>
                    {{ type }}
                </option>
            {% endfor %}
        </select>

        <p>好きな旅行</p>
        <textarea name="favorite_travel"
                  placeholder="例：韓国カフェ巡り、温泉、写真映え">{{ profile['favorite_travel'] if profile else '' }}</textarea>

        <br>
        <button type="submit">プロフィールを保存</button>

    </form>

</div>

<script>
function toggleMenu() {
    const menu = document.getElementById("menuContent");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}
</script>

<script>
function setTheme(theme){
    localStorage.setItem("theme", theme);
    applyTheme(theme);
}

function applyTheme(theme){
    if(theme === "pink"){
        document.documentElement.style.setProperty("--bg-color","#fff7f8");
        document.documentElement.style.setProperty("--main-color","#ff8fa3");
        document.documentElement.style.setProperty("--border-color","#ffd6dc");
        document.documentElement.style.setProperty("--soft-color","#ffe1e7");
    }

    if(theme === "blue"){
        document.documentElement.style.setProperty("--bg-color","#f0f9ff");
        document.documentElement.style.setProperty("--main-color","#60a5fa");
        document.documentElement.style.setProperty("--border-color","#bfdbfe");
        document.documentElement.style.setProperty("--soft-color","#dbeafe");
    }

    if(theme === "yellow"){
        document.documentElement.style.setProperty("--bg-color","#fffbea");
        document.documentElement.style.setProperty("--main-color","#facc15");
        document.documentElement.style.setProperty("--border-color","#fde68a");
        document.documentElement.style.setProperty("--soft-color","#fef3c7");
    }
}

window.onload = function(){
    const savedTheme = localStorage.getItem("theme") || "pink";
    applyTheme(savedTheme);
}
</script>

</body>
</html>
